<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPA Trie — English Phonological Grammar</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        overflow: hidden;
        background: #06060c;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #d0d0d8;
      }
      canvas { display: block; }
      #label-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      /* Loading */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #06060c;
        z-index: 1000;
        gap: 16px;
      }
      #loading.hidden { display: none; }
      #loading .spinner {
        width: 28px; height: 28px;
        border: 2px solid rgba(255,255,255,0.08);
        border-top-color: rgba(255,255,255,0.4);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #loading span { font-size: 13px; color: #555; letter-spacing: 0.3px; }

      /* Tooltip */
      #tooltip {
        position: fixed;
        pointer-events: none;
        background: rgba(8, 8, 16, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 12px;
        line-height: 1.6;
        max-width: 260px;
        z-index: 100;
        display: none;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      }
      #tooltip .phoneme {
        font-size: 26px;
        font-weight: 600;
        margin-bottom: 2px;
        letter-spacing: 1px;
      }
      #tooltip .meta {
        color: #666;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }
      #tooltip .lang-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 3px;
        font-size: 11px;
      }
      #tooltip .lang-name {
        min-width: 54px;
        color: #999;
      }
      #tooltip .lang-dot {
        display: inline-block;
        width: 6px; height: 6px;
        border-radius: 50%;
        margin-right: 4px;
        flex-shrink: 0;
      }
      #tooltip .lang-bar {
        flex: 1;
        height: 3px;
        background: rgba(255,255,255,0.05);
        border-radius: 2px;
        overflow: hidden;
      }
      #tooltip .lang-bar-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.15s;
      }
      #tooltip .lang-count {
        min-width: 36px;
        text-align: right;
        color: #777;
        font-variant-numeric: tabular-nums;
        font-size: 10px;
      }
      #tooltip .terminal-tag {
        display: inline-block;
        font-size: 8px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 1px 5px;
        border-radius: 3px;
        background: rgba(100, 255, 160, 0.15);
        color: #6fda8e;
        vertical-align: middle;
        margin-left: 6px;
      }
      #tooltip .passthrough-tag {
        display: inline-block;
        font-size: 8px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 1px 5px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.06);
        color: #555;
        vertical-align: middle;
        margin-left: 6px;
      }
      #tooltip .allophone-row {
        font-size: 10px;
        color: #777;
        margin: 4px 0 6px;
      }
      #tooltip .allophone {
        color: #aaa;
        font-style: italic;
        margin: 0 2px;
      }
      #tooltip .words-section {
        margin-top: 8px;
        padding-top: 6px;
        border-top: 1px solid rgba(255,255,255,0.06);
      }
      #tooltip .word-row {
        font-size: 11px;
        color: #ccc;
        margin-top: 2px;
      }
      #tooltip .word-row em {
        font-style: normal;
        color: #e8e8e8;
      }
      #tooltip .word-more {
        color: #555;
        font-size: 9px;
        margin-left: 4px;
      }

      /* Filter panel */
      #filter-panel {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(8, 8, 16, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 14px;
        padding: 18px 20px;
        z-index: 50;
        min-width: 210px;
        backdrop-filter: blur(16px);
        box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      }
      #filter-panel h3 {
        font-size: 10px;
        font-weight: 600;
        margin-bottom: 10px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 1.2px;
      }
      .filter-section { margin-bottom: 16px; }
      .filter-section:last-child { margin-bottom: 0; }
      .filter-section label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 3px 0;
        font-size: 12px;
        transition: opacity 0.15s;
      }
      .filter-section label:hover { opacity: 0.85; }
      .filter-section input[type="checkbox"] {
        appearance: none;
        width: 14px; height: 14px;
        border: 1.5px solid rgba(255,255,255,0.2);
        border-radius: 3px;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
      }
      .filter-section input[type="checkbox"]:checked {
        border-color: rgba(255,255,255,0.4);
        background: rgba(255,255,255,0.1);
      }
      .filter-section input[type="checkbox"]:checked::after {
        content: '';
        position: absolute;
        left: 3px; top: 0.5px;
        width: 5px; height: 8px;
        border: solid rgba(255,255,255,0.7);
        border-width: 0 1.5px 1.5px 0;
        transform: rotate(45deg);
      }

      .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: #555;
        margin-top: 4px;
      }
      .slider-row input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 2px;
        outline: none;
      }
      .slider-row input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px; height: 12px;
        border-radius: 50%;
        background: rgba(255,255,255,0.35);
        cursor: pointer;
        border: none;
      }
      .slider-row input[type="range"]::-webkit-slider-thumb:hover {
        background: rgba(255,255,255,0.5);
      }
      .slider-row .value {
        min-width: 28px;
        text-align: right;
        font-variant-numeric: tabular-nums;
        color: #777;
        font-size: 11px;
      }

      /* Legend */
      .legend {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(255,255,255,0.05);
        font-size: 9px;
        color: #444;
        line-height: 1.6;
        letter-spacing: 0.3px;
      }
      .legend-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .legend-swatch {
        width: 20px; height: 4px;
        border-radius: 2px;
        flex-shrink: 0;
      }

      /* Stats */
      #stats {
        position: fixed;
        bottom: 20px;
        left: 20px;
        font-size: 10px;
        color: #333;
        z-index: 50;
        letter-spacing: 0.3px;
      }
      #essay-link {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 50;
        font-size: 11px;
        color: #555;
        text-decoration: none;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.06);
        background: rgba(8,8,16,0.85);
        backdrop-filter: blur(8px);
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
        letter-spacing: 0.3px;
      }
      #essay-link:hover { color: #aaa; border-color: rgba(255,255,255,0.15); }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <span>Loading phonological trie...</span>
    </div>
    <div id="tooltip"></div>
    <a id="essay-link" href="/essay.html">The Shape of Meaning &rarr;</a>
    <div id="filter-panel"></div>
    <div id="stats"></div>
    <canvas id="label-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
